name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest, ubuntu-24.04-arm ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - name: Fix cached RubyGems permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          gems_path='${{ steps.set-up-homebrew.outputs.gems-path }}'
          if [ -d "$gems_path" ]; then
            # Bundler refuses to remove/reinstall gems when parent dirs are world-writable.
            if command -v sudo >/dev/null 2>&1; then
              sudo find "$gems_path" -type d -perm -0002 -exec chmod o-w {} +
            else
              find "$gems_path" -type d -perm -0002 -exec chmod o-w {} +
            fi
          fi

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
